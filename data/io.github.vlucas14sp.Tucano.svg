<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1ED1A2"/>
      <stop offset="1" stop-color="#0C7A5E"/>
    </linearGradient>
    <linearGradient id="upper" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#FF9A1F"/>
      <stop offset="1" stop-color="#FF5E00"/>
    </linearGradient>
    <linearGradient id="lower" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#FFDB45"/>
      <stop offset="1" stop-color="#FFB000"/>
    </linearGradient>
  </defs>

  <!-- App tile -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#tile)"/>
  <rect x="8" y="8" width="112" height="56" rx="26" fill="#ffffff" fill-opacity="0.08"/>

  <!-- Head -->
  <path d="M50 33
           C66 33, 77 46, 75 63
           C74 79, 62 89, 47 89
           C33 89, 24 76, 25 60
           C26 45, 37 33, 50 33 Z" fill="#15151B"/>

  <!-- White throat crescent -->
  <path d="M54 63
           C64 65, 64 79, 53 84
           C46 86, 42 80, 43 73
           C44 67, 49 63, 54 63 Z" fill="#FFFFFF"/>

  <!-- Upper mandible (orange) — the hero -->
  <path d="M62 43
           C84 37, 106 43, 115 61
           C103 63, 83 64, 63 64
           C62 57, 61 50, 62 43 Z" fill="url(#upper)"/>
  <!-- Lower mandible (yellow) -->
  <path d="M63 64
           C83 64, 103 63, 115 61
           C105 73, 85 80, 65 82
           C64 76, 63 70, 63 64 Z" fill="url(#lower)"/>
  <!-- beak ridge -->
  <path d="M63 64 C83 64, 103 63, 115 61" fill="none" stroke="#C24A06" stroke-opacity="0.35" stroke-width="1.6"/>

  <!-- Eye -->
  <circle cx="44" cy="51" r="6.6" fill="#FF8C1A"/>
  <circle cx="44" cy="51" r="4.3" fill="#FFFFFF"/>
  <circle cx="45" cy="52" r="2.3" fill="#15151B"/>
</svg>
